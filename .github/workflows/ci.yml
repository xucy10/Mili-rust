name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: # 允许手动触发

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: 检查代码
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: 检查格式
        run: cargo fmt --all -- --check
      
      - name: Clippy 检查
        run: cargo clippy --workspace --all-features -- -D warnings

  build:
    name: 构建 (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      
      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: 构建 Debug
        run: cargo build --verbose
      
      - name: 构建 Release
        run: cargo build --release --verbose
      
      - name: 上传 Windows 构建产物
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mili-rust-windows
          path: target/release/mili-rust.exe
          retention-days: 30
      
      - name: 上传 Linux 构建产物
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mili-rust-linux
          path: target/release/mili-rust
          retention-days: 30
      
      - name: 上传 macOS 构建产物
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mili-rust-macos
          path: target/release/mili-rust
          retention-days: 30

  test:
    name: 测试
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      
      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: 运行测试
        run: cargo test --workspace --verbose

  release:
    name: 发布
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 打包
        run: |
          cd artifacts
          zip -r ../mili-rust-windows.zip mili-rust-windows/
          zip -r ../mili-rust-linux.zip mili-rust-linux/
          zip -r ../mili-rust-macos.zip mili-rust-macos/
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: |
            ## 自动构建
            
            ### 下载
            
            - [Windows](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/mili-rust-windows.zip)
            - [Linux](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/mili-rust-linux.zip)
            - [macOS](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/mili-rust-macos.zip)
            
            ### 使用方法
            
            1. 下载对应系统的压缩包
            2. 解压后运行 `mili-rust` (或 `mili-rust.exe`)
            3. 用 Minecraft 26.2 客户端连接 `localhost`
          files: |
            mili-rust-windows.zip
            mili-rust-linux.zip
            mili-rust-macos.zip
          draft: false
          prerelease: false
